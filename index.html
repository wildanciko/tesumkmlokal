<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Sembako</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>




















































































































































































































































































































































<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-green-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-shopping-basket text-3xl"></i>
                    <h1 class="text-2xl font-bold">Toko Sembako</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="cartBtn" class="relative">
                        <i class="fas fa-shopping-cart text-2xl"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="container mx-auto px-4 py-6">
        <div class="max-w-2xl mx-auto">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Cari produk sembako..." 
                    class="w-full px-4 py-3 pl-12 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">
                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
            </div>
        </div>
    </div>

    <!-- Category Filter -->
    <div class="container mx-auto px-4 pb-6">
        <div class="flex flex-wrap gap-2 justify-center">
            <button class="category-btn active px-4 py-2 rounded-full bg-green-600 text-white" data-category="semua">Semua</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 text-gray-700 hover:bg-green-100" data-category="beras">Beras</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 text-gray-700 hover:bg-green-100" data-category="minyak">Minyak</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 text-gray-700 hover:bg-green-100" data-category="gula">Gula</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 text-gray-700 hover:bg-green-100" data-category="tepung">Tepung</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 text-gray-700 hover:bg-green-100" data-category="bumbu">Bumbu</button>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="container mx-auto px-4 py-12 text-center">
        <i class="fas fa-spinner fa-spin text-4xl text-green-600"></i>
        <p class="mt-4 text-gray-600">Memuat produk...</p>
    </div>

    <!-- Products Grid -->
    <div class="container mx-auto px-4 pb-12">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Products will be loaded here -->
        </div>
        <div id="noResults" class="hidden text-center py-12">
            <i class="fas fa-box-open text-6xl text-gray-300"></i>
            <p class="mt-4 text-gray-600 text-lg">Produk tidak ditemukan</p>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold">Keranjang Belanja</h2>
                    <button id="closeCart" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
            </div>
            <div id="cartItems" class="p-6 overflow-y-auto max-h-96">
                <!-- Cart items will be loaded here -->
            </div>
            <div class="p-6 border-t bg-gray-50">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xl font-bold">Total:</span>
                    <span id="cartTotal" class="text-2xl font-bold text-green-600">Rp 0</span>
                </div>
                <button id="checkoutBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">
                    <i class="fas fa-check-circle mr-2"></i>Pesan Sekarang
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
